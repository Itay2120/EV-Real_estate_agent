name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-s3-deploy
          aws-region: us-east-1

      - name: Upload to S3
        run: aws s3 sync . s3://${{ vars.BUCKET_NAME }} --delete --exclude ".git/*" --exclude ".github/*"